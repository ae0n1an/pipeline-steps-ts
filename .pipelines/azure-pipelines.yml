# Composable TypeScript step pipeline: generate synthetic CSV -> GPG-encrypt
# with a public key from Azure Key Vault. Steps run directly via tsx (no
# build/emit); tsc runs in --noEmit mode as a type-check gate.

trigger:
  - main

pool:
  vmImage: ubuntu-latest

variables:
  PIPELINE_WORKSPACE: $(Pipeline.Workspace)

stages:
  - stage: Generate
    jobs:
      - job: build_data
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'

          - script: npm ci
            displayName: 'Install dependencies'

          - script: npm run typecheck
            displayName: 'Type-check steps (tsc --noEmit)'

          - script: npm run test:scenarios
            displayName: 'Run scenario regression tests'

          # ---- Fetch GPG public key from Azure Key Vault ---------------
          - task: AzureKeyVault@2
            displayName: 'Fetch GPG public key from Key Vault'
            inputs:
              azureSubscription: 'my-service-connection'
              KeyVaultName: 'my-keyvault'
              SecretsFilter: 'gpg-public-key'
              RunAsPreJob: false

          # ---- Fetch an ARM access token for the ADF management API,
          # and export SPN credentials for DefaultAzureCredential -------
          - task: AzureCLI@2
            displayName: 'Fetch ADF access token and export SPN credentials'
            inputs:
              azureSubscription: 'my-service-connection'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              addSpnToEnvironment: true
              inlineScript: |
                TOKEN=$(az account get-access-token --resource https://management.azure.com/ --query accessToken -o tsv)
                echo "##vso[task.setvariable variable=adfAccessToken;issecret=true]$TOKEN"
                echo "##vso[task.setvariable variable=azureClientId;issecret=true]$servicePrincipalId"
                echo "##vso[task.setvariable variable=azureClientSecret;issecret=true]$servicePrincipalKey"
                echo "##vso[task.setvariable variable=azureTenantId;issecret=true]$tenantId"

          # ---- Step 1: generate synthetic CSV -------------------------
          - script: >
              npx tsx runner/run-step.ts
              --step steps/generate-synthetic-csv.ts
              --config configs/generate-users-csv.json
              --name genUsersCsv
            name: genUsersCsv
            displayName: 'Generate synthetic users CSV'

          # ---- Step 2: GPG-encrypt the CSV (composes on step 1) -------
          - script: >
              npx tsx runner/run-step.ts
              --step steps/gpg-encrypt-file.ts
              --config configs/gpg-encrypt-users-csv.json
              --name gpgEncryptCsv
            name: gpgEncryptCsv
            displayName: 'GPG encrypt CSV with Key Vault key'
            env:
              GPG_PUBLIC_KEY: $(gpg-public-key)   # secrets are never auto-exposed to scripts

          # ---- Step: clean up old inbound payloads before uploading ---
          - script: >
              npx tsx runner/run-step.ts
              --step steps/remove-blob-files.ts
              --config configs/remove-blob-files.json
              --name cleanupInbound
            name: cleanupInbound
            displayName: 'Remove old inbound blob payloads'
            env:
              AZURE_CLIENT_ID: $(azureClientId)
              AZURE_CLIENT_SECRET: $(azureClientSecret)
              AZURE_TENANT_ID: $(azureTenantId)

          # ---- Step: upload the encrypted payload to inbound storage --
          - script: >
              npx tsx runner/run-step.ts
              --step steps/upload-to-blob.ts
              --config configs/upload-to-blob.json
              --name uploadPayload
            name: uploadPayload
            displayName: 'Upload encrypted payload to inbound blob storage'
            env:
              AZURE_CLIENT_ID: $(azureClientId)
              AZURE_CLIENT_SECRET: $(azureClientSecret)
              AZURE_TENANT_ID: $(azureTenantId)

          # ---- Step 3: trigger ADF pipelines in parallel, poll to done -
          - script: >
              npx tsx runner/run-step.ts
              --step steps/trigger-adf-pipeline.ts
              --config configs/trigger-adf-pipelines.json
              --name triggerAdf
            name: triggerAdf
            displayName: 'Trigger ADF pipelines'
            env:
              ADF_ACCESS_TOKEN: $(adfAccessToken)

          - task: PublishPipelineArtifact@1
            displayName: 'Publish step outputs'
            inputs:
              targetPath: '$(Pipeline.Workspace)/step-output'
              artifact: 'step-output'

  - stage: Deliver
    dependsOn: Generate
    variables:
      encryptedFile: $[ stageDependencies.Generate.build_data.outputs['gpgEncryptCsv.gpgEncryptCsv.usersCsvGpg_encryptedPath'] ]
    jobs:
      - job: ship_data
        steps:
          - download: current
            artifact: step-output

          # ---- Step: verify + download the outbound result file -------
          # NOTE: azureClientId/azureClientSecret/azureTenantId are set via
          # task.setvariable in the Generate stage's AzureCLI@2 task (above);
          # pipeline variables set that way do NOT cross stage boundaries.
          # A real pipeline needs its own AzureCLI@2 task here in Deliver,
          # with addSpnToEnvironment: true, to re-export these for this step
          # — illustrative only, like the rest of this file's placeholders.
          - script: >
              npx tsx runner/run-step.ts
              --step steps/verify-and-download-blob.ts
              --config configs/verify-and-download-blob.json
              --name verifyResult
            name: verifyResult
            displayName: 'Verify and download outbound result'
            env:
              AZURE_CLIENT_ID: $(azureClientId)
              AZURE_CLIENT_SECRET: $(azureClientSecret)
              AZURE_TENANT_ID: $(azureTenantId)

          # ---- Step: verify the outbound result's row count -------------
          - script: >
              npx tsx runner/run-step.ts
              --step steps/verify-row-count.ts
              --config configs/verify-row-count.json
              --name verifyRowCount
            name: verifyRowCount
            displayName: 'Verify outbound result row count'

          # ---- Step: validate the outbound result against its schema ---
          - script: >
              npx tsx runner/run-step.ts
              --step steps/validate-json-schema.ts
              --config configs/validate-json-schema.json
              --name validateSchema
            name: validateSchema
            displayName: 'Validate outbound result JSON schema'

          # ---- Step: cross-check inbound CSV against outbound result ---
          - script: >
              npx tsx runner/run-step.ts
              --step steps/validate-business-logic.ts
              --config configs/validate-business-logic.json
              --name validateBusinessLogic
            name: validateBusinessLogic
            displayName: 'Validate inbound/outbound business logic'

          - script: |
              echo "Encrypted artifact from upstream: $(encryptedFile)"
              cat $(Pipeline.Workspace)/step-output/gpgEncryptCsv/output.json
            displayName: 'Read upstream JSON / pick up encrypted file'
